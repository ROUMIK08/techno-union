<!DOCTYPE html>
<html>

<head>

<title>Techno Union (Sarcastic Humour)</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-mart@latest/css/emoji-mart.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:15px;
font-size:22px;
background:#020617;
color:#38bdf8;
}

#login{
text-align:center;
padding:40px;
}

#username{
padding:10px;
border:none;
border-radius:6px;
width:200px;
}

#app{
display:none;
flex:1;
display:flex;
}

#sidebar{
width:220px;
background:#020617;
border-right:1px solid #1e293b;
padding:10px;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
display:flex;
margin-bottom:10px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
margin-right:8px;
}

.bubble{
background:#1e293b;
padding:10px;
border-radius:8px;
max-width:400px;
}

.username{
color:#38bdf8;
font-weight:bold;
}

.reactions span{
cursor:pointer;
margin-right:5px;
}

#inputArea{
display:flex;
gap:6px;
padding:10px;
background:#020617;
}

#message{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>Techno Union (Sarcastic Humour)</header>

<div id="login">

<h2>Enter Techno Union</h2>

<input id="username" placeholder="Enter your name">

<br><br>

<button onclick="joinServer()">Join Chat</button>

</div>

<div id="app">

<div id="sidebar">

<h3>Members</h3>

<div id="members"></div>

</div>

<div id="chatArea">

<div id="messages"></div>

<div id="inputArea">

<button id="emojiBtn">😀</button>

<button id="gifBtn">GIF</button>

<button id="voiceBtn">🎤</button>

<input type="file" id="fileInput">

<input id="message" placeholder="Message">

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>

<script>

const socket=io()

let username=""
let avatar=""
let replying=null

function joinServer(){

username=document.getElementById("username").value.trim()

if(username===""){
alert("Enter name")
return
}

avatar="https://api.dicebear.com/7.x/bottts/svg?seed="+username

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="flex"

socket.emit("join",username)

}

/* render message */

const messages=document.getElementById("messages")

function renderMessage(data){

let div=document.createElement("div")

div.className="msg"

div.innerHTML=

`
<img src="${data.avatar||avatar}" class="avatar">

<div class="bubble">

<div class="username">${data.username||data.user}</div>

${data.reply?`<div style="font-size:12px;color:#94a3b8">Reply: ${data.reply}</div>`:""}

<div>${data.text}</div>

<div class="reactions">

<span onclick="react('👍')">👍</span>

<span onclick="react('😂')">😂</span>

<span onclick="react('🔥')">🔥</span>

</div>

<button onclick="reply('${data.text}')">Reply</button>

</div>
`

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

/* send message */

function sendMessage(){

let text=document.getElementById("message").value.trim()

if(text==="")return

socket.emit("chat message",{
username:username,
avatar:avatar,
text:text,
reply:replying
})

replying=null

document.getElementById("message").value=""

}

/* receive */

socket.on("chat message",data=>{
renderMessage(data)
})

socket.on("user list",users=>{

const members=document.getElementById("members")

members.innerHTML=""

users.forEach(u=>{

let div=document.createElement("div")

div.innerText="🟢 "+u

members.appendChild(div)

})

})

function reply(text){
replying=text
document.getElementById("message").focus()
}

function react(e){
document.getElementById("message").value+=e
}

/* emoji picker */

const picker=new EmojiMart.Picker({
onEmojiSelect:e=>{
document.getElementById("message").value+=e.native
}
})

document.body.appendChild(picker)

picker.style.position="absolute"
picker.style.bottom="80px"
picker.style.right="20px"
picker.style.display="none"

document.getElementById("emojiBtn").onclick=()=>{
picker.style.display=picker.style.display=="none"?"block":"none"
}

/* file sending */

document.getElementById("fileInput").addEventListener("change",function(){

const file=this.files[0]

const reader=new FileReader()

reader.onload=()=>{

socket.emit("chat message",{
username:username,
avatar:avatar,
text:`<img src="${reader.result}" style="max-width:200px;border-radius:6px">`
})

}

reader.readAsDataURL(file)

})

/* voice message */

let recorder
let chunks=[]

document.getElementById("voiceBtn").onclick=async()=>{

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.start()

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=()=>{

const blob=new Blob(chunks)

const url=URL.createObjectURL(blob)

socket.emit("chat message",{
username:username,
avatar:avatar,
text:`<audio controls src="${url}"></audio>`
})

chunks=[]

}

setTimeout(()=>recorder.stop(),4000)

}

</script>

</body>

</html>
